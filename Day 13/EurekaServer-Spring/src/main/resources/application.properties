spring.application.name=EurekaServer-Spring
# Eureka Server Configuration
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
server.port=8761

# -------------------------------------------------------
# Self-Preservation Fix
# -------------------------------------------------------
# Disable self-preservation so Eureka actually expires
# instances that stop sending heartbeats.
eureka.server.enable-self-preservation=false

# Evict unresponsive instances every 2 seconds (default 60s).
eureka.server.eviction-interval-timer-in-ms=2000